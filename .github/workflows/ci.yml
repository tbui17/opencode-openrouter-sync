name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install opencode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Initialize opencode config
        run: mkdir -p ~/.config/opencode && echo '{"provider":{"openrouter":{}}}' > ~/.config/opencode/opencode.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun test --timeout 60000

      - name: E2E Tests
        run: bun test tests/e2e/
